name: Hermes - Generador de Notícies Autònom

on:
  schedule:
    # Se ejecuta a las 08:00 UTC (10:00 hora de Sabadell/Madrid en verano) de lunes a viernes
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions en GitHub

jobs:
  generate-news:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código del repositorio
        uses: actions/checkout:v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node:v4
        with:
          node-version: 20

      - name: Generar noticia del día con Hermes
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: node scripts/hermes-generate.js

      - name: Confirmar y subir los cambios (Commit & Push)
        run: |
          git config --global user.name "Hermes Asistente"
          git config --global user.email "hermes@aves.local"
          
          # Verificar si newsData.ts ha sido modificado
          if git diff --name-only | grep -q "src/data/newsData.ts"; then
            echo "Nueva noticia detectada. Subiendo cambios..."
            git add src/data/newsData.ts
            git commit -m "chore(news): nueva noticia del dia creada por Hermes [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No se ha generado ningún cambio en las noticias."
          fi
