# Decap CMS Configuration
local_backend: true

backend:
  name: github
  repo: aolivari/eixample_sabadell
  branch: main
  base_url: https://eixample-sabadell.vercel.app
  auth_endpoint: api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "noticies"
    label: "Notícies"
    folder: "src/content/noticies"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title_ca"
    fields:
      - { label: "Títol (Català)", name: "title_ca", widget: "string" }
      - { label: "Título (Castellano)", name: "title_es", widget: "string" }
      - { label: "Categoría (Català)", name: "category_ca", widget: "string", default: "Activitats" }
      - { label: "Categoría (Castellano)", name: "category_es", widget: "string", default: "Actividades" }
      - { label: "Data de Publicació", name: "date", widget: "date" }
      - { label: "Temps de Lectura (Català)", name: "readTime_ca", widget: "string", default: "4 min de lectura" }
      - { label: "Tiempo de Lectura (Castellano)", name: "readTime_es", widget: "string", default: "4 min de lectura" }
      - { label: "Imatge Portada", name: "image", widget: "image" }
      - { label: "Alt de la Imatge (Català)", name: "alt_ca", widget: "string" }
      - { label: "Alt de la Imagen (Castellano)", name: "alt_es", widget: "string" }
      - { label: "Descripció Curta (Català)", name: "description_ca", widget: "text" }
      - { label: "Descripción Corta (Castellano)", name: "description_es", widget: "text" }
      - { label: "Destacat (Featured)", name: "featured", widget: "boolean", default: false }
      - { label: "Cos de la Notícia (Català)", name: "body_ca", widget: "markdown" }
      - { label: "Cuerpo de la Noticia (Castellano)", name: "body_es", widget: "markdown" }
